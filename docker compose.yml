version: '3.8'

services:
  cassandra1:
    image: cassandra:4.1
    container_name: cassandra1
    env_file:
      - .env
    environment:
      - MAX_HEAP_SIZE=256M
      - HEAP_NEWSIZE=50M
      - CASSANDRA_CLUSTER_NAME=${CASSANDRA_CLUSTER_NAME}
      - CASSANDRA_DC=${CASSANDRA_DC}
      - CASSANDRA_RACK=${CASSANDRA_RACK}
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

volumes:
  cassandra_data:
